<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopGen Demo Order</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f5f3f0;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      max-width: 550px;
      width: 100%;
      background: white;
      border-radius: 28px;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    .banner {
      background: #1a2c1c;
      padding: 20px 24px;
      color: white;
      text-align: center;
    }
    .banner h1 {
      margin: 0;
      font-size: 1.6rem;
      font-weight: 600;
    }
    .banner p {
      margin: 6px 0 0;
      opacity: 0.8;
      font-size: 0.85rem;
    }
    .product-preview {
      display: flex;
      gap: 16px;
      padding: 20px 24px;
      background: #faf8f5;
      border-bottom: 1px solid #eae4da;
    }
    .product-preview img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 16px;
      background: #e2dbd1;
    }
    .product-info {
      flex: 1;
    }
    .product-info h3 {
      margin: 0 0 4px;
      font-size: 1.1rem;
    }
    .product-info .price {
      color: #2e6b4f;
      font-weight: 700;
      font-size: 1.1rem;
    }
    .product-info .brand {
      font-size: 0.75rem;
      color: #8b7355;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    form {
      padding: 24px;
    }
    label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #5e4b34;
      display: block;
      margin-top: 16px;
      margin-bottom: 6px;
    }
    input, select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #ddd6ce;
      border-radius: 16px;
      font-size: 0.95rem;
      background: white;
      transition: 0.2s;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #c9a84c;
      box-shadow: 0 0 0 2px rgba(201,168,76,0.2);
    }
    button {
      margin-top: 28px;
      width: 100%;
      background: #2e6b4f;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 40px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    button:hover {
      background: #1e4f3a;
      transform: translateY(-1px);
    }
    .demo-badge {
      background: #fef3c7;
      color: #b45309;
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 600;
      text-align: center;
      margin: 0 24px 24px;
    }
    .success {
      background: #e6f7ec;
      color: #1e4f3a;
      padding: 20px;
      border-radius: 20px;
      text-align: center;
      margin: 0 24px 24px;
    }
    .hidden {
      display: none;
    }
    .footer-note {
      font-size: 0.7rem;
      text-align: center;
      color: #aa9a83;
      padding: 16px 24px 24px;
      border-top: 1px solid #eee8e0;
    }
  </style>
</head>
<body>
<div class="card" id="orderCard">
  <div class="banner">
    <h1>🎭 ShopGen Demo Order</h1>
    <p>Academic prototype – no real transaction</p>
  </div>

  <div id="productPreview" class="product-preview">
    <!-- dynamic content -->
  </div>

  <div class="demo-badge">
    ⚡ Auto‑filled from WhatsApp | Demo only
  </div>

  <form id="orderForm">
    <label>Full Name</label>
    <input id="name" required>

    <label>WhatsApp Number</label>
    <input id="phone" required>

    <label>Delivery City</label>
    <input id="city" required>

    <label>Street Address</label>
    <input id="address" required>

    <label>Size</label>
    <select id="size">
      <option>S</option><option>M</option><option>L</option><option>XL</option>
    </select>

    <button type="submit">✅ Confirm Demo Order</button>
  </form>

  <div id="successMessage" class="success hidden"></div>
  <div class="footer-note">
    This is a simulated environment for FYP demonstration.<br>
    Your details are only used to show the auto‑order flow.
  </div>
</div>

<script>
  (function() {
    const params = new URLSearchParams(window.location.search);
    const productId = params.get('product_id') || 'demo-001';
    const productName = params.get('product_name') || 'Demo Fashion Product';
    const productPrice = params.get('price') || '0';
    const productBrand = params.get('brand') || 'Pakistani Brand';
    const productImg = params.get('image') || 'https://images.unsplash.com/photo-1610030469983-98e550d6193c?w=200';

    // Pre‑fill user data from WhatsApp (passed via URL)
    document.getElementById('name').value = params.get('name') || '';
    document.getElementById('phone').value = params.get('phone') || '';
    document.getElementById('city').value = params.get('city') || 'Lahore';

    // Show product preview
    const previewDiv = document.getElementById('productPreview');
    previewDiv.innerHTML = `
      <img src="${productImg}" alt="${productName}" onerror="this.src='https://images.unsplash.com/photo-1558769132-cb1aea458c5e?w=200'">
      <div class="product-info">
        <div class="brand">${productBrand}</div>
        <h3>${productName}</h3>
        <div class="price">PKR ${Number(productPrice).toLocaleString()}</div>
      </div>
    `;

    // Order submission
    const form = document.getElementById('orderForm');
    const successDiv = document.getElementById('successMessage');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const order = {
        order_id: 'DEMO-' + Date.now(),
        product_id: productId,
        product_name: productName,
        brand: productBrand,
        price: Number(productPrice),
        name: document.getElementById('name').value,
        phone: document.getElementById('phone').value,
        city: document.getElementById('city').value,
        address: document.getElementById('address').value,
        size: document.getElementById('size').value,
        source: 'whatsapp_demo',
        placed_at: new Date().toISOString()
      };

      // Save locally (so dashboard can show)
      const existing = JSON.parse(localStorage.getItem('shopgen_orders') || '[]');
      existing.push(order);
      localStorage.setItem('shopgen_orders', JSON.stringify(existing));

      // Send to your bot's webhook (replace URL with your actual backend)
      const BACKEND_URL = 'https://tristin-roentgenoscopic-incomparably.ngrok-free.dev/webhook';  // ⚠️ CHANGE THIS
      try {
        await fetch(`${BACKEND_URL}/webhook/order`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(order)
        });
      } catch (err) {
        console.warn('Backend unreachable, order saved locally only');
      }

      // Show success and hide form
      form.classList.add('hidden');
      successDiv.classList.remove('hidden');
      successDiv.innerHTML = `
        <strong>✅ Order placed (simulated)</strong><br>
        Order ID: ${order.order_id}<br>
        You will receive a confirmation on WhatsApp shortly.<br>
        <small style="display:block; margin-top:12px;">🎓 This is a thesis demonstration – no real payment taken.</small>
      `;
    });
  })();
</script>
</body>
</html>
