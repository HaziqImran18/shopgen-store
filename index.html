<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Processing Demo Order...</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f5f3f0;
      margin: 0;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 28px;
      padding: 32px;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #e2dbd1;
      border-top-color: #2e6b4f;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .success { color: #2e6b4f; }
    .error { color: #c0392b; }
  </style>
</head>
<body>
<div class="card" id="statusCard">
  <div class="spinner"></div>
  <h2>Processing Demo Order...</h2>
  <p>Placing order on your behalf. This will take a moment.</p>
  <div id="message" style="margin-top: 20px;"></div>
</div>

<script>
  (function() {
    const params = new URLSearchParams(window.location.search);
    
    // Extract all data from URL
    const orderData = {
      order_id: 'AUTO-' + Date.now(),
      product_id: params.get('product_id') || 'demo-001',
      product_name: params.get('product_name') || 'Demo Product',
      brand: params.get('brand') || 'Pakistani Brand',
      price: Number(params.get('price') || 0),
      name: params.get('name') || 'Auto User',
      phone: params.get('phone') || '923001234567',
      city: params.get('city') || 'Lahore',
      address: params.get('address') || 'Auto-filled demo address, Main Boulevard',
      size: params.get('size') || 'M',
      source: 'whatsapp_auto',
      placed_at: new Date().toISOString()
    };

    // Save to localStorage (for dashboard)
    const existing = JSON.parse(localStorage.getItem('shopgen_orders') || '[]');
    existing.push(orderData);
    localStorage.setItem('shopgen_orders', JSON.stringify(existing));

    // Send to your bot's webhook
    const BACKEND_URL = 'https://tristin-roentgenoscopic-incomparably.ngrok-free.dev';  // CHANGE THIS
    fetch(`${BACKEND_URL}/webhook/order`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(orderData)
    })
    .then(response => response.json())
    .then(data => {
      document.querySelector('.spinner').style.display = 'none';
      document.getElementById('statusCard').innerHTML = `
        <div style="font-size: 48px;">✅</div>
        <h2 class="success">Order Placed!</h2>
        <p>Order ID: ${orderData.order_id}</p>
        <p>A confirmation has been sent to your WhatsApp.</p>
        <small style="display: block; margin-top: 20px; color: #8b7355;">🎓 Thesis demo – fully automated</small>
        <script>setTimeout(() => window.close(), 3000);<\/script>
      `;
    })
    .catch(err => {
      document.querySelector('.spinner').style.display = 'none';
      document.getElementById('statusCard').innerHTML = `
        <div style="font-size: 48px;">⚠️</div>
        <h2 class="error">Demo Order Saved Locally</h2>
        <p>Backend not reachable, but order recorded in browser.</p>
        <small>For full demo, ensure ngrok is running.</small>
      `;
    });
  })();
</script>
</body>
</html>
